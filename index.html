<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mekan Keşfet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --warm: #1D9BF0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: #0f0f0f;
    color: white;
    overflow: hidden;
  }

  .page-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: rgba(15,15,15,0.95);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    height: 64px;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
  }

  .header-logo-icon {
    width: 40px; height: 40px;
    background: var(--warm);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 16px rgba(29,155,240,0.25);
  }

  .header-logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 900;
  }

  .header-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-nav a {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 12px;
    border-radius: 10px;
    transition: background 0.2s;
  }

  .header-nav a:hover {
    background: rgba(255,255,255,0.1);
  }

  #map {
    position: absolute;
    top: 64px;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100%;
    background: #1a1a2e;
  }

  .leaflet-popup-content {
    margin: 12px 14px !important;
    font-family: 'DM Sans', sans-serif;
  }
  
  .leaflet-popup-content-wrapper {
    border-radius: 12px !important;
  }
</style>
</head>
<body>

  <header class="page-header">
    <a href="index.html" class="header-logo">
      <div class="header-logo-icon">🗺️</div>
      <span class="header-logo-text">Mekan Keşfet</span>
    </a>
    <nav class="header-nav">
      <a href="arama.html">🔍 Ara</a>
    </nav>
  </header>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var map = L.map('map', { center: [40.99, 29.03], zoom: 13, zoomControl: true });
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap, &copy; CARTO'
    }).addTo(map);

    fetch('./data/venues.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var venues = data.venues || data;
        var bounds = [];

        venues.forEach(function(v) {
          var lat = v.location && v.location.coordinates && v.location.coordinates.lat;
          var lng = v.location && v.location.coordinates && v.location.coordinates.lng;
          if (!lat || !lng) return;

          var rating = ((v.rating && v.rating.overall) || 0).toFixed(1);
          var reviewCount = (v.rating && v.rating.reviewCount) || 0;
          var slug = v.slug || '';
          var name = v.name || 'İsimsiz';
          var category = v.category || '';
          var price = (v.pricing && v.pricing.range) || '';
          var imageUrl = (v.media && v.media.coverImage) || '';

          var popupContent = 
            '<div style="min-width:220px;max-width:240px">' +
              (imageUrl ? '<div style="width:100%;height:120px;background-image:url(\'' + imageUrl + '\');background-size:cover;background-position:center;border-radius:8px;margin-bottom:10px"></div>' : '') +
              '<strong style="font-size:15px;display:block;margin-bottom:4px">' + name + '</strong>' +
              '<div style="color:#666;font-size:12px;margin-bottom:6px">' + category + ' · ' + price + '</div>' +
              '<div style="font-size:13px;margin-bottom:10px">⭐ ' + rating + ' <span style="color:#999">(' + reviewCount + ' yorum)</span></div>' +
              '<a href="venue.html?slug=' + encodeURIComponent(slug) + '" style="display:block;text-align:center;background:#1D9BF0;color:white;padding:8px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none">Detayları Gör →</a>' +
            '</div>';

          L.marker([lat, lng])
            .addTo(map)
            .bindPopup(popupContent, { maxWidth: 240 });
          
          bounds.push([lat, lng]);
        });

        if (bounds.length > 0) {
          map.fitBounds(bounds, { padding: [60, 60] });
        }
      })
      .catch(function(err) {
        console.error('Harita yükleme hatası:', err);
      });
  </script>
</body>
</html>
