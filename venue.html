<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Mekan Detayı - EatGo</title>
<script src="js/db.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#F7F7F7;--dark:#0F0F0F;--warm:#1D9BF0;--muted:#536471;--border:#EFF3F4;--card:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#F7F7F7;color:var(--dark);padding-bottom:80px;}
.back-bar{position:sticky;top:0;z-index:50;background:white;border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;}
.back-btn{width:40px;height:40px;border:none;background:var(--cream);border-radius:12px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.back-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;}
.cover{width:100%;height:280px;background:#ddd;background-size:cover;background-position:center;position:relative;}
.cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,0.4));}
.featured-badge{position:absolute;top:16px;left:16px;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);color:white;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;}
.content{max-width:800px;margin:0 auto;padding:24px 16px;}
.venue-name{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;line-height:1.1;margin-bottom:8px;}
.venue-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:14px;color:var(--muted);margin-bottom:16px;}
.venue-meta span{display:inline-flex;align-items:center;gap:4px;}
.dot{width:3px;height:3px;background:var(--muted);border-radius:50%;display:inline-block;}
.rating-row{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:16px;background:white;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.04);}
.rating-big{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--dark);line-height:1;}
.rating-info{flex:1;}
.rating-stars{color:#F5A623;font-size:16px;margin-bottom:2px;}
.rating-count{font-size:13px;color:var(--muted);}
.price-pill{background:var(--cream);padding:8px 14px;border-radius:12px;font-weight:600;font-size:14px;}
.section{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.04);}
.section-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:16px;}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px;cursor:pointer;transition:transform 0.2s;}
.gallery img:hover{transform:scale(1.02);}
.hours-list{display:flex;flex-direction:column;gap:8px;}
.hour-row{display:flex;justify-content:space-between;font-size:14px;padding:6px 0;}
.hour-row.today{font-weight:700;color:var(--dark);background:var(--cream);padding:8px 12px;border-radius:8px;}
.hour-day{color:var(--muted);}
.hour-row.today .hour-day{color:var(--dark);}
.hour-time{font-weight:600;}
.contact-list{display:flex;flex-direction:column;gap:12px;}
.contact-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--cream);border-radius:12px;text-decoration:none;color:var(--dark);font-size:14px;font-weight:500;transition:background 0.2s;}
.contact-item:hover{background:#EFF3F4;}
.contact-icon{font-size:18px;width:28px;text-align:center;}
.contact-text{flex:1;}
.review-item{padding:16px 0;border-bottom:1px solid var(--border);}
.review-item:last-child{border-bottom:none;}
.review-header{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.review-avatar{width:40px;height:40px;border-radius:50%;background:var(--cream);object-fit:cover;}
.review-avatar-fallback{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1D9BF0,#0a6cb8);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;}
.review-author{font-weight:600;font-size:14px;}
.review-meta{font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:center;}
.review-stars{color:#F5A623;font-size:13px;}
.review-text{font-size:14px;line-height:1.6;color:var(--dark);white-space:pre-wrap;}
.review-text.collapsed{max-height:120px;overflow:hidden;position:relative;}
.review-text.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(to bottom,transparent,white);}
.read-more{background:none;border:none;color:var(--warm);font-weight:600;font-size:13px;cursor:pointer;padding:8px 0 0;font-family:'DM Sans',sans-serif;}
.cta-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px;}
.cta-btn{padding:14px;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;}
.cta-primary{background:var(--dark);color:white;}
.cta-secondary{background:white;color:var(--dark);border:1.5px solid var(--dark);}
.error-state{padding:60px 20px;text-align:center;}
.error-state h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:12px;}
.error-state p{color:var(--muted);margin-bottom:24px;}
.error-state a{display:inline-block;padding:12px 24px;background:var(--dark);color:white;text-decoration:none;border-radius:12px;font-weight:600;}
.loading{padding:60px 20px;text-align:center;color:var(--muted);}
</style>
</head>
<body>
<div class="back-bar">
<button class="back-btn" onclick="window.location.href='anasayfa.html'">←</button>
<div class="back-title">Mekan Detayı</div>
</div>
<div id="content">
<div class="loading">🔄 Yükleniyor...</div>
</div>
<script>
console.log('🚀 venue.html yükleniyor...');

function getSlugFromUrl(){
  var hash = window.location.hash.slice(1);
  if(hash) return decodeURIComponent(hash);
  var params = new URLSearchParams(window.location.search);
  var slug = params.get('slug');
  return slug ? decodeURIComponent(slug) : null;
}

function escapeHtml(str){
  if(!str) return '';
  return String(str).replace(/[&<>"']/g, function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
  });
}

function proxyPhoto(url, placeId) {
  if (!url) return url;
  // Yeni Places API v1 URL'leri direkt çalışır (browser redirect takip eder)
  if (url.includes('places.googleapis.com/v1/')) return url;
  if (!url.includes('googleapis.com')) return url;
  // Eski format: photoreference= → yeni endpoint'e çevir
  var m = url.match(/photoreference=([^&]+)/);
  if (m && placeId) {
    return 'https://places.googleapis.com/v1/places/' + placeId +
      '/photos/' + m[1] + '/media?maxWidthPx=1200' +
      '&key=AIzaSyApsshzyL42u5DqGzi_80bMsdGDL1XnW3c';
  }
  return url;
}

function getStars(rating){
  var full = Math.floor(rating);
  var stars = '';
  for(var i=0;i<5;i++){
    stars += i<full ? '★' : '☆';
  }
  return stars;
}

function getTodayKey(){
  var days = ['pazar','pazartesi','salı','çarşamba','perşembe','cuma','cumartesi'];
  return days[new Date().getDay()];
}

function renderVenue(venue){
  if(!venue){
    document.getElementById('content').innerHTML =
      '<div class="error-state">' +
      '<h2>Mekan bulunamadı</h2>' +
      '<p>Aradığınız mekan veritabanında yok.</p>' +
      '<a href="anasayfa.html">← Anasayfaya dön</a>' +
      '</div>';
    return;
  }

  console.log('✅ Mekan render ediliyor:', venue.name);

  var name = escapeHtml(venue.name || 'İsimsiz Mekan');
  var category = escapeHtml(venue.category || 'Restoran');
  var neighborhood = escapeHtml(venue.location?.neighborhood || venue.location?.city || 'İstanbul');
  var address = escapeHtml(venue.location?.address || '');
  var rating = venue.rating?.overall || 4.0;
  var reviewCount = venue.rating?.reviewCount || 0;
  var priceRange = escapeHtml(venue.pricing?.range || '₺₺');
  var coverImage = proxyPhoto(venue.media?.coverImage || (venue.media?.gallery && venue.media.gallery[0]) || '', venue.id);
  var gallery = venue.media?.gallery || [];
  var hours = venue.hours || {};
  var contact = venue.contact || {};
  var reviews = venue.reviews || [];
  var featured = venue.featured;
  var openNow = venue.openNow;

  var html = '';

  // Cover — fallback to gradient if image fails
  var coverStyle = coverImage
    ? 'background-image:url(\'' + coverImage + '\');background-color:#1a1f2e;'
    : 'background:linear-gradient(135deg,#0a1628,#1a1f2e,#0d2040);';
  html += '<div class="cover" id="coverDiv" style="' + coverStyle + '">';
  if(coverImage){
    html += '<img src="' + coverImage + '" style="display:none;" onerror="(function(el){var d=document.getElementById(\'coverDiv\');d.style.backgroundImage=\'\';d.style.background=\'linear-gradient(135deg,#0a1628,#1a1f2e,#0d2040)\';d.innerHTML+=\'<div style=\\\'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;opacity:.15;\\\'>' + escapeHtml(category) + '</div>\'})(this)">';
  }
  html += '<div class="cover-overlay"></div>';
  if(featured){
    html += '<div class="featured-badge">⭐ Öne Çıkan</div>';
  }
  html += '</div>';

  html += '<div class="content">';

  // Name + meta
  html += '<h1 class="venue-name">' + name + '</h1>';
  html += '<div class="venue-meta">';
  html += '<span>📍 ' + neighborhood + '</span>';
  html += '<span class="dot"></span>';
  html += '<span>🍽️ ' + category + '</span>';
  if(openNow !== undefined){
    html += '<span class="dot"></span>';
    html += '<span style="color:' + (openNow ? '#16a34a' : '#dc2626') + ';font-weight:600;">';
    html += openNow ? '● Açık' : '● Kapalı';
    html += '</span>';
  }
  html += '</div>';

  // Rating row
  html += '<div class="rating-row">';
  html += '<div class="rating-big">' + rating.toFixed(1) + '</div>';
  html += '<div class="rating-info">';
  html += '<div class="rating-stars">' + getStars(rating) + '</div>';
  html += '<div class="rating-count">' + reviewCount.toLocaleString('tr-TR') + ' Google yorumu <span style="font-size:11px;color:var(--muted);">(7 Mart 2026 itibarıyla)</span></div>';
  html += '</div>';
  html += '<div class="price-pill">' + priceRange + '</div>';
  html += '</div>';

  // Menü butonu
  if(venue.menu_url){
    html += '<a href="' + escapeHtml(venue.menu_url) + '" target="_blank" rel="noopener" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;margin:16px 0 4px;background:linear-gradient(135deg,#e65c00,#f9d423);color:#fff;font-weight:700;font-size:15px;border-radius:14px;text-decoration:none;box-shadow:0 4px 15px rgba(230,92,0,.35);">';
    html += '🍽️ Menüyü Gör</a>';
  }

  // Gallery
  if(gallery.length > 0){
    var catEmoji = {'Restoran':'🍽️','Kahvaltı':'🥐','Kahve':'☕','Burger':'🍔','Pizza':'🍕','Vegan':'🥗','Bar':'🍷','Tatlı':'🍰','Asya':'🍜','Döner':'🥙'}[category] || '🍽️';
    html += '<div class="section">';
    html += '<div class="section-title">📸 Fotoğraflar</div>';
    html += '<div class="gallery">';
    gallery.slice(0, 6).forEach(function(img, i){
      var proxied = proxyPhoto(img, venue.id);
      html += '<div style="position:relative;aspect-ratio:1;">';
      html += '<div style="position:absolute;inset:0;background:linear-gradient(135deg,#0a1628,#1a1f2e);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px;opacity:.5;">' + catEmoji + '</div>';
      html += '<img src="' + proxied + '" alt="" loading="lazy" referrerpolicy="no-referrer" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:12px;" onerror="this.style.display=\'none\'">';
      html += '</div>';
    });
    html += '</div>';
    html += '</div>';
  }

  // Hours
  if(Object.keys(hours).length > 0){
    var todayKey = getTodayKey();
    html += '<div class="section">';
    html += '<div class="section-title">🕐 Çalışma Saatleri</div>';
    html += '<div class="hours-list">';
    var dayLabels = {
      'pazartesi':'Pazartesi','salı':'Salı','çarşamba':'Çarşamba',
      'perşembe':'Perşembe','cuma':'Cuma','cumartesi':'Cumartesi','pazar':'Pazar'
    };
    var dayOrder = ['pazartesi','salı','çarşamba','perşembe','cuma','cumartesi','pazar'];
    dayOrder.forEach(function(key){
      if(hours[key]){
        var isToday = key === todayKey;
        html += '<div class="hour-row' + (isToday ? ' today' : '') + '">';
        html += '<span class="hour-day">' + dayLabels[key] + (isToday ? ' (Bugün)' : '') + '</span>';
        html += '<span class="hour-time">' + escapeHtml(hours[key]) + '</span>';
        html += '</div>';
      }
    });
    html += '</div>';
    html += '</div>';
  }

  // Contact
  var hasContact = contact.phone || contact.website || address;
  if(hasContact){
    html += '<div class="section">';
    html += '<div class="section-title">📞 İletişim</div>';
    html += '<div class="contact-list">';
    if(contact.phone){
      html += '<a class="contact-item" href="tel:' + escapeHtml(contact.phone) + '">';
      html += '<span class="contact-icon">📞</span>';
      html += '<span class="contact-text">' + escapeHtml(contact.phone) + '</span>';
      html += '</a>';
    }
    if(address){
      var mapsUrl = contact.googleMapsUrl || ('https://maps.google.com/?q=' + encodeURIComponent(address));
      html += '<a class="contact-item" href="' + mapsUrl + '" target="_blank" rel="noopener">';
      html += '<span class="contact-icon">📍</span>';
      html += '<span class="contact-text">' + address + '</span>';
      html += '</a>';
    }
    if(contact.website){
      html += '<a class="contact-item" href="' + escapeHtml(contact.website) + '" target="_blank" rel="noopener">';
      html += '<span class="contact-icon">🌐</span>';
      html += '<span class="contact-text">Web sitesi</span>';
      html += '</a>';
    }
    html += '</div>';
    html += '</div>';
  }

  // Reviews
  if(reviews.length > 0){
    var googleReviewsUrl = contact.googleMapsUrl || ('https://www.google.com/maps/place/?q=place_id:' + (venue.id || ''));
    html += '<div class="section">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">';
    html += '<div class="section-title" style="margin-bottom:0;">💬 Google Yorumları</div>';
    html += '<a href="' + googleReviewsUrl + '" target="_blank" rel="noopener" style="font-size:13px;font-weight:600;color:#1D9BF0;text-decoration:none;white-space:nowrap;">Tümünü gör →</a>';
    html += '</div>';
    reviews.slice(0, 5).forEach(function(rev, idx){
      var initial = (rev.author || '?').charAt(0).toUpperCase();
      var revText = rev.text || '';
      var isLong = revText.length > 200;
      html += '<div class="review-item">';
      html += '<div class="review-header">';
      if(rev.profilePhoto){
        html += '<img class="review-avatar" src="' + rev.profilePhoto + '" alt="" onerror="this.outerHTML=\'<div class=&quot;review-avatar-fallback&quot;>' + initial + '</div>\'">';
      } else {
        html += '<div class="review-avatar-fallback">' + initial + '</div>';
      }
      html += '<div>';
      html += '<div class="review-author">' + escapeHtml(rev.author || 'Anonim') + '</div>';
      html += '<div class="review-meta">';
      html += '<span class="review-stars">' + getStars(rev.rating || 5) + '</span>';
      if(rev.time){
        html += '<span>' + escapeHtml(rev.time) + '</span>';
      }
      html += '</div>';
      html += '</div>';
      html += '</div>';
      html += '<div class="review-text' + (isLong ? ' collapsed' : '') + '" id="rev-' + idx + '">' + escapeHtml(revText) + '</div>';
      if(isLong){
        html += '<button class="read-more" onclick="document.getElementById(\'rev-' + idx + '\').classList.toggle(\'collapsed\');this.textContent=this.textContent===\'Devamını oku\'?\'Daha az göster\':\'Devamını oku\';">Devamını oku</button>';
      }
      html += '</div>';
    });
    html += '<a href="' + googleReviewsUrl + '" target="_blank" rel="noopener" style="display:block;text-align:center;padding:12px;margin-top:8px;border-radius:12px;border:1.5px solid var(--border);font-size:13px;font-weight:700;color:var(--dark);text-decoration:none;">Google\'da tüm yorumları gör →</a>';
    html += '</div>';
  }

  // CTA buttons
  html += '<div class="cta-row">';
  if(contact.phone){
    html += '<a class="cta-btn cta-primary" href="tel:' + escapeHtml(contact.phone) + '">📞 Ara</a>';
  }
  var mapsUrl = contact.googleMapsUrl || (address ? ('https://maps.google.com/?q=' + encodeURIComponent(address)) : '');
  if(mapsUrl){
    html += '<a class="cta-btn cta-secondary" href="' + mapsUrl + '" target="_blank" rel="noopener">🗺️ Yol Tarifi</a>';
  }
  html += '</div>';

  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

async function init(){
  var slug = getSlugFromUrl();
  console.log('🔍 Aranan slug:', slug);

  if(!slug){
    document.getElementById('content').innerHTML =
      '<div class="error-state">' +
      '<h2>Mekan seçilmedi</h2>' +
      '<p>URL\'de slug parametresi bulunamadı.</p>' +
      '<a href="anasayfa.html">← Anasayfaya dön</a>' +
      '</div>';
    return;
  }

  try{
    var venue = null;

    if(window.DB && window.DB._ready()){
      console.log('📡 Supabase\'den yükleniyor...');
      venue = await window.DB.fetchVenue(slug);
    } else {
      var response = await fetch('./data/venues.json');
      if(!response.ok) throw new Error('HTTP ' + response.status);
      var data = await response.json();
      var venues = data.venues || data;
      venue = venues.find(function(v){ return v.slug === slug; }) || null;
    }

    console.log('🎯 Bulunan mekan:', venue ? venue.name : 'YOK');

    renderVenue(venue);

    if(venue){
      document.title = venue.name + ' - EatGo';
    }
  } catch(err){
    console.error('❌ Yükleme hatası:', err);
    document.getElementById('content').innerHTML =
      '<div class="error-state">' +
      '<h2>Bir şeyler ters gitti</h2>' +
      '<p>' + err.message + '</p>' +
      '<a href="anasayfa.html">← Anasayfaya dön</a>' +
      '</div>';
  }
}

window.addEventListener('hashchange', init);
init();

console.log('✅ venue.html hazır');
</script>
</body>
</html>
