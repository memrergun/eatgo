<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İstanbul Rehberi — Mekan Keşfet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#F7F4EF;--dark:#0F0F0F;--warm:#1D9BF0;--muted:#6B7280;--border:#E5E0D8;--card:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--dark);font-family:'DM Sans',sans-serif;padding-bottom:90px;}

.header{position:sticky;top:0;z-index:50;background:var(--cream);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;letter-spacing:-.5px;}
.header-sub{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px;}

/* DISTRICT TABS */
.district-tabs{display:flex;gap:8px;padding:14px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--cream);position:sticky;top:57px;z-index:40;}
.district-tabs::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.dtab.active{background:var(--dark);color:white;border-color:var(--dark);}

/* ARTICLE */
.article{margin-bottom:0;border-bottom:8px solid var(--border);}

/* HERO */
.art-hero{position:relative;height:320px;overflow:hidden;background:#111;}
.art-hero-img{width:100%;height:100%;object-fit:cover;opacity:.7;}
.art-hero-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:120px;opacity:.15;}
.art-hero-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.3) 60%,transparent 100%);}
.art-hero-content{position:absolute;bottom:0;left:0;right:0;padding:20px;}
.art-district-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);color:white;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:10px;}
.art-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:white;line-height:1.1;margin-bottom:6px;}
.art-intro{font-size:13px;line-height:1.6;color:rgba(255,255,255,.8);}

/* VENUE STRIP */
.art-header{padding:16px 16px 4px;display:flex;align-items:baseline;justify-content:space-between;}
.art-section-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.art-count{font-size:12px;color:var(--warm);font-weight:600;}

.venue-strip{display:flex;gap:12px;padding:12px 16px 16px;overflow-x:auto;scrollbar-width:none;}
.venue-strip::-webkit-scrollbar{display:none;}

.vcard{flex-shrink:0;width:160px;background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08);cursor:pointer;transition:transform .15s;}
.vcard:hover{transform:translateY(-3px);}
.vcard-img{height:110px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;overflow:hidden;}
.vcard-img img{width:100%;height:100%;object-fit:cover;}
.vcard-rating{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);color:white;font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;}
.vcard-body{padding:10px;}
.vcard-name{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vcard-meta{font-size:11px;color:var(--muted);}

/* LOADING */
.strip-loading{padding:20px;color:var(--muted);font-size:13px;}

/* BIG FEATURE */
.feature-card{margin:0 16px 16px;background:var(--card);border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.09);cursor:pointer;}
.feature-img{height:180px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:80px;position:relative;overflow:hidden;}
.feature-img img{width:100%;height:100%;object-fit:cover;}
.feature-body{padding:14px;}
.feature-tag{display:inline-block;background:#F3F4F6;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:8px;margin-bottom:8px;}
.feature-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:5px;}
.feature-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:10px;}
.feature-footer{display:flex;align-items:center;justify-content:space-between;}
.feature-score{font-size:13px;font-weight:700;color:var(--dark);}
.feature-cta{font-size:12px;font-weight:700;color:var(--warm);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;font-size:10px;color:var(--muted);cursor:pointer;}
.nav-item.active{color:var(--dark);font-weight:700;}
.nav-item span:first-child{font-size:20px;}
</style>
</head>
<body>

<div class="bottom-nav">

<script src="js/db.js"></script>
<script>
// ——————————————————————————

var DISTRICTS = [

    title: 'Boğaz\'ın İki Yakasında Lezzet',
    intro: 'Ortaköy\'de camilerin gölgesinde tüten kumpir, Etiler\'in sınır tanımaz kahvaltı mekânları, Arnavutköy\'ün Boğaz manzaralı balık tavernaları. Beşiktaş hem geleneksel hem modern yüzünü bu sokaklarda buluyorsunuz — gündüz brunch, gece Çırağan sarayı ışıkları altında akşam yemeği.',

// ——————————————————————————
// SUPABASE YARDIMCILARI
// ——————————————————————————
var SB_URL = window.SUPABASE_URL;
var SB_KEY = window.SUPABASE_ANON_KEY;

function sbHeaders() {
  return { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };
}

async function fetchBySlug(slugs) {
  if (!slugs || !slugs.length) return [];
  var url = SB_URL + '/rest/v1/venues?select=data,menu_url&slug=in.(' + slugs.map(encodeURIComponent).join(',') + ')&limit=' + slugs.length;
  var r = await fetch(url, { headers: sbHeaders() });
  if (!r.ok) return [];
  var rows = await r.json();
  return rows.map(function(row) { var v = row.data; if (row.menu_url) v.menu_url = row.menu_url; return v; });
}

async function fetchByDistrict(filter, limit) {
  if (!filter) return [];
  var url = SB_URL + '/rest/v1/venues?select=data,slug&limit=' + (limit || 8) + '&order=rating.desc';
  // filter by address ILIKE
  url += '&data->>address=ilike.*' + encodeURIComponent(filter) + '*';
  var r = await fetch(url, { headers: sbHeaders() });
  if (!r.ok) return [];
  var rows = await r.json();
  return rows.map(function(row) { return row.data || row; });
}

// Supabase REST JSONB filter — use RPC-style or flat column
// Since address is nested in JSONB, we use the `data->location->>address` approach:
async function fetchByDistrictAddress(filter, limit) {
  // Use flat columns: lat/lng bounding boxes per district
  var boxes = {
    'Kadıköy':  { latMin:40.960, latMax:41.020, lngMin:29.010, lngMax:29.100 },
    'Beşiktaş': { latMin:41.025, latMax:41.090, lngMin:28.980, lngMax:29.070 },
    'Beyoğlu':  { latMin:41.015, latMax:41.050, lngMin:28.960, lngMax:29.010 },
    'Üsküdar':  { latMin:41.010, latMax:41.060, lngMin:29.010, lngMax:29.080 },
    'Şişli':    { latMin:41.045, latMax:41.080, lngMin:28.960, lngMax:29.020 },
    'Bakırköy': { latMin:40.960, latMax:41.010, lngMin:28.820, lngMax:28.900 },
    'Ataşehir': { latMin:40.980, latMax:41.030, lngMin:29.080, lngMax:29.160 }
  };
  var box = boxes[filter];
  if (!box) return [];
  var url = SB_URL + '/rest/v1/venues?select=data,menu_url'
    + '&lat=gte.' + box.latMin + '&lat=lte.' + box.latMax
    + '&lng=gte.' + box.lngMin + '&lng=lte.' + box.lngMax
    + '&order=rating.desc&limit=' + (limit || 8);
  var r = await fetch(url, { headers: sbHeaders() });
  if (!r.ok) return [];
  var rows = await r.json();
  return rows.map(function(row) { var v = row.data; if (v && row.menu_url) v.menu_url = row.menu_url; return v; }).filter(Boolean);
}

// ——————————————————————————
// KART RENDER
// ——————————————————————————
function emojiFor(cat) {
  if (!cat) return '🍽️';
  var c = cat.toLowerCase();
  if (c.includes('cafe')||c.includes('kafeterya')||c.includes('coffee')) return '☕';
  if (c.includes('kahvaltı')||c.includes('breakfast')) return '🥐';
  if (c.includes('pastane')||c.includes('bakery')||c.includes('tatlı')) return '🍰';
  if (c.includes('bar')) return '🍺';
  if (c.includes('pizza')) return '🍕';
  if (c.includes('burger')||c.includes('fast')) return '🍔';
  if (c.includes('deniz')||c.includes('balık')||c.includes('seafood')) return '🐟';
  return '🍽️';
}

function renderVenueCard(venue) {
  var name = venue.name || 'Mekan';
  var slug = venue.slug || '';
  var cat = venue.category || 'Restoran';
  var rating = venue.rating ? (venue.rating.overall || venue.rating) : null;
  var ratingNum = typeof rating === 'object' ? rating.overall : parseFloat(rating);
  var img = venue.media && (venue.media.coverImage || (venue.media.gallery && venue.media.gallery[0]));
  var neighborhood = (venue.location && (venue.location.neighborhood || venue.location.city)) || '';

  var card = document.createElement('div');
  card.className = 'vcard';
  card.onclick = function() { window.location.href = 'venue.html#' + encodeURIComponent(slug); };

  var imgHTML = img
    ? '<img src="' + img + '" alt="' + name + '" onerror="this.parentNode.innerHTML=\'<span style=font-size:44px>' + emojiFor(cat) + '</span>\'">'
    : '<span style="font-size:44px;">' + emojiFor(cat) + '</span>';

  card.innerHTML =
    '<div class="vcard-img">' + imgHTML +
    (ratingNum ? '<div class="vcard-rating">★ ' + ratingNum.toFixed(1) + '</div>' : '') +
    '</div>' +
    '<div class="vcard-body">' +
    '<div class="vcard-name">' + name + '</div>' +
    '<div class="vcard-meta">' + (neighborhood ? neighborhood + ' · ' : '') + cat + '</div>' +
    '</div>';

  return card;
}

// ——————————————————————————
// ARTİKEL RENDER
// ——————————————————————————
function buildArticle(d) {
  var article = document.createElement('div');
  article.className = 'article';
  article.dataset.district = d.id;

  article.innerHTML =
    '<div class="art-hero" style="background:' + d.heroGradient + ';">' +
    '<div class="art-hero-bg">' + d.emoji + '</div>' +
    '<div class="art-hero-gradient"></div>' +
    '<div class="art-hero-content">' +
    '<div class="art-district-tag">' + d.tag + '</div>' +
    '<div class="art-title">' + d.title + '</div>' +
    '<div class="art-intro">' + d.intro + '</div>' +
    '</div></div>' +
    '<div class="art-header">' +
    '<div class="art-section-label">🏆 ' + d.angle + '</div>' +
    '<div class="art-count" id="cnt-' + d.id + '"></div>' +
    '</div>' +
    '<div class="venue-strip" id="strip-' + d.id + '">' +
    '<div class="strip-loading">Yükleniyor…</div>' +
    '</div>';

  return article;
}

async function loadArticleVenues(d) {
  var strip = document.getElementById('strip-' + d.id);
  var cntEl = document.getElementById('cnt-' + d.id);
  if (!strip) return;

  try {
    var venues = [];
    if (d.slugs && d.slugs.length) {
      venues = await fetchBySlug(d.slugs);
      // Slug'lardan gelmeyenleri bounding box ile tamamla
      if (venues.length < 4) {
        var extra = await fetchByDistrictAddress(d.filter, 8);
        extra.forEach(function(v) {
          if (!venues.find(function(x) { return x && v && x.slug === v.slug; })) venues.push(v);
        });
      }
    } else {
      venues = await fetchByDistrictAddress(d.filter, 8);
    }

    venues = venues.filter(Boolean).slice(0, 8);
    strip.innerHTML = '';

    if (!venues.length) {
      strip.innerHTML = '<div class="strip-loading">Bu ilçe için yakında içerik geliyor…</div>';
      return;
    }

    if (cntEl) cntEl.textContent = venues.length + ' mekan';

    venues.forEach(function(v) {
      var card = renderVenueCard(v);
      if (card) strip.appendChild(card);
    });
  } catch(e) {
    strip.innerHTML = '<div class="strip-loading">Yüklenemedi.</div>';
  }
}

// ——————————————————————————
// SAYFA OLUŞTUR
// ——————————————————————————
var activeFilter = 'all';

function renderAll() {
  var container = document.getElementById('articlesContainer');
  container.innerHTML = '';
  DISTRICTS.forEach(function(d) {
    if (activeFilter !== 'all' && activeFilter !== d.id) return;
    var article = buildArticle(d);
    container.appendChild(article);
    loadArticleVenues(d);
  });
}

// Tab tıklama
document.querySelectorAll('.dtab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.dtab').forEach(function(t) { t.classList.remove('active'); });
    this.classList.add('active');
    activeFilter = this.dataset.id;
    renderAll();
  });
});

// Hero görselini ilk yüklenen mekan fotoğrafından al
async function upgradeHeroes() {
  DISTRICTS.forEach(async function(d) {
    var hero = document.querySelector('[data-district="' + d.id + '"] .art-hero');
    if (!hero) return;
    try {
      var venues = d.slugs && d.slugs.length
        ? await fetchBySlug([d.slugs[0]])
        : await fetchByDistrictAddress(d.filter, 1);
      if (!venues[0]) return;
      var img = venues[0].media && (venues[0].media.coverImage || (venues[0].media.gallery && venues[0].media.gallery[0]));
      if (!img) return;
      var bg = document.createElement('img');
      bg.className = 'art-hero-img';
      bg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.45;';
      bg.src = img;
      bg.onerror = function() { this.remove(); };
      hero.insertBefore(bg, hero.firstChild);
    } catch(e) {}
  });
}

// Başlat
document.addEventListener('DOMContentLoaded', function() {
  renderAll();
  setTimeout(upgradeHeroes, 800);
});
</script>
